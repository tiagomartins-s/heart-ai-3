<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Assistente Cardiológico</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 400px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        #header { background: #d9534f; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #mensagens { height: 400px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; }
        .msg-usuario { background: #0275d8; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-bot { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        #input-container { display: flex; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 15px; border: none; outline: none; }
        button { padding: 15px 20px; background: #5cb85c; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #4cae4c; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">❤️ Triagem Cardiológica</div>
    <div id="mensagens">
        <div class="msg msg-bot">Olá! Sou o Assistente Cardiológico. Como posso ajudar hoje?</div>
    </div>
    <div id="input-container">
        <input type="text" id="inputMensagem" placeholder="Digite sua mensagem..." onkeypress="if(event.key === 'Enter') enviarMensagem()">
        <button onclick="enviarMensagem()">Enviar</button>
    </div>
</div>

<script>
    // Watson Assistant v1 usa 'context' para manter o estado da conversa
    let watsonContext = {};

    async function enviarMensagem() {
        const input = document.getElementById('inputMensagem');
        const texto = input.value.trim();
        if (!texto) return;

        addMensagem(texto, 'msg-usuario');
        input.value = '';

        try {
            const resposta = await fetch('/api/mensagem', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Envia o context atual junto com a mensagem
                body: JSON.stringify({ mensagem: texto, context: watsonContext })
            });
            const dados = await resposta.json();

            // Atualiza o context com o retornado pelo Watson para a próxima mensagem
            if (dados.context) watsonContext = dados.context;

            addMensagem(dados.resposta || 'Sem resposta do assistente.', 'msg-bot');

        } catch (error) {
            addMensagem('Erro de conexão com o servidor.', 'msg-bot');
        }
    }

    function addMensagem(texto, classe) {
        const div = document.createElement('div');
        div.className = `msg ${classe}`;
        div.textContent = texto;
        const mensagens = document.getElementById('mensagens');
        mensagens.appendChild(div);
        mensagens.scrollTop = mensagens.scrollHeight;
    }
</script>

</body>
</html>
